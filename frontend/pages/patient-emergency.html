<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="emergency">Emergency</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1 data-i18n="emergency">Emergency</h1>
      <button id="lang-toggle" class="lang-btn">SO</button>
    </header>
    <main>
      <form id="emergency-form" class="card">
        <div class="form-group">
          <label for="name" data-i18n="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
          <label for="age" data-i18n="age">Age</label>
          <input type="number" id="age" name="age" required>
        </div>
        <div class="form-group">
          <label for="location" data-i18n="location">Location</label>
          <input type="text" id="location" name="location" required>
        </div>
        <div class="form-group">
          <label for="address" data-i18n="address">Address</label>
          <input type="text" id="address" name="address" required>
        </div>
        <div class="form-group">
          <label for="emergency-type" data-i18n="emergencyType">Emergency Type</label>
          <select id="emergency-type" name="emergencyType" required>
            <option value="accident" data-i18n="accident">Accident</option>
            <option value="heart-attack" data-i18n="heartAttack">Heart Attack</option>
            <option value="stroke" data-i18n="stroke">Stroke</option>
            <option value="other" data-i18n="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="description" data-i18n="description">Description</label>
          <textarea id="description" name="description" required></textarea>
        </div>
        <div id="map" style="height: 200px; margin: 1rem 0;"></div>
        <button type="submit" class="primary" data-i18n="sendEmergency">Send Emergency</button>
      </form>
    </main>
    <footer>
      <button onclick="location.href='dashboard.html'" data-i18n="back">Back</button>
    </footer>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="../js/patient-emergency.js"></script>
</body>
</html>
