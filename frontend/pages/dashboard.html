<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard</title>
<link rel="stylesheet" href="../css/styles.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
<div class="lang-toggle">
  <button onclick="parent.setLanguage('en')">EN</button>
  <button onclick="parent.setLanguage('so')">SO</button>
</div>
<div id="app">
  <header><h1 data-i18n="dashboard">Dashboard</h1></header>
  <div id="menu" class="card"></div>
  <button id="logout" class="secondary" data-i18n="logout">Logout</button>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="../js/dashboard.js"></script>
</body>
</html>
