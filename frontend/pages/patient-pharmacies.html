<!DOCTYPE html>
<html lang="en">
<head>

  <title data-i18n="pharmacies">Pharmacies</title>

</head>
<body>

      <h1 data-i18n="pharmacies">Licensed Pharmacies</h1>

    <main>
      <section class="card">

    </main>
    <footer>
      <button onclick="location.href='dashboard.html'" data-i18n="back">Back</button>
    </footer>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
