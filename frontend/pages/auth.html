<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auth</title>
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<header class="top-bar">
  <h1>E-Health Somaliland Platform</h1>
</header>

<div class="page-horizontal-wrapper">
    <div class="side-container">
        <img src="../images/somaliland-flag.png" class="side-img" alt="Somaliland Flag">
    </div>

    <div id="app">
        <div class="lang-toggle">
          <button onclick="setLanguage('en')">EN</button>
          <button onclick="setLanguage('so')">SO</button>
        </div>

        <header class="form-header">
          <h1 id="form-title" data-i18n="login">Login</h1>
        </header>

        <div class="card">
          <form id="auth-form">
            <div class="form-group" id="name-group" style="display:none;">
              <label data-i18n="name">Name</label>
              <input name="name" type="text" data-i18n-placeholder="name" />
            </div>

            <div class="form-group">
              <label data-i18n="email">Email</label>
              <input name="email" type="email" data-i18n-placeholder="email" required />
            </div>

            <div class="form-group" id="phone-group" style="display:none;">
              <label data-i18n="phone">Phone Number</label>
              <input name="phone" type="tel" data-i18n-placeholder="phone" />
            </div>

            <div class="form-group">
              <label data-i18n="password">Password</label>
              <input name="password" type="password" data-i18n-placeholder="password" required />
            </div>

            <div class="form-group" id="role-group" style="display:none;">
              <label data-i18n="role">Role</label>
              <select name="role" id="role-select">
                <option value="patient" data-i18n="patient">Patient</option>
                <option value="doctor" data-i18n="doctor">Doctor</option>
                <option value="pharmacist" data-i18n="pharmacist">Pharmacist</option>
                <option value="admin" data-i18n="admin">Administrator</option>
              </select>
            </div>

            <div class="form-group" id="hospital-group" style="display:none;">
              <label>Workplace (Hospital)</label>
              <select name="hospital_id" id="hospital-select">
                <option value="">-- Select Hospital --</option>
              </select>
            </div>

            <button class="primary" type="submit" data-i18n="submit">Submit</button>
          </form>

          <p id="toggle">
            <a href="#" id="toggle-link" data-i18n="register">Don't have an account? Register</a>
          </p>
        </div>
    </div>

    <div class="side-container">
        <img src="../images/beautiful-somaliland-ai.png" class="side-img" alt="Landscape">
    </div>
</div>

<script type="module" src="../js/lang.js"></script>
<script type="module" src="../js/auth.js"></script>
</body>
</html>
